name: Rust CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      run_live_tests:
        description: 'Run network live tests (set true to enable)'
        required: false
        default: 'false'

jobs:
  test:
    name: Tests (${{ matrix.rust }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust: [stable, beta, nightly]
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry and git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache target
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-target-${{ matrix.rust }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-${{ matrix.rust }}-

      - name: Install Rust toolchain and components
        uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ matrix.rust }}
          profile: minimal
          override: true
          components: rustfmt, clippy

      - name: Run cargo fmt (check)
        run: cargo fmt --all -- --check

      - name: Run cargo clippy
        run: |
          cargo clippy --manifest-path MarketData/Cargo.toml --package market_data --all-targets || true

      - name: Run tests
        run: cargo test --manifest-path MarketData/Cargo.toml --package market_data -- --nocapture

  live-tests:
    name: Live/network tests (manual)
    if: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.run_live_tests == 'true') }}
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain and components
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true
          components: rustfmt, clippy
      - name: Run live/network tests
        env:
          MARKET_DATA_LIVE_TESTS: 1
        run: cargo test --manifest-path MarketData/Cargo.toml --package market_data -- --nocapture
