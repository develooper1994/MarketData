name: Rust CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      run_live_tests:
        description: 'Run network live tests (set true to enable)'
        required: false
        default: 'false'

jobs:
  test:
    name: Tests (${{ matrix.rust }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust: [stable, beta, nightly]
    steps:
      - uses: actions/checkout@v4
      - name: Locate Cargo manifest
        id: manifest
        shell: bash
        run: |
          set -euo pipefail
          selected=""
          # Search for a Cargo.toml that defines the `market_data` package
          while IFS= read -r -d '' f; do
            if grep -qE '^\s*\[package\]\s*$' "$f" 2>/dev/null; then
              if grep -qE '^\s*name\s*=\s*"market_data"' "$f" 2>/dev/null; then
                selected="$f"
                break
              fi
            fi
          done < <(find . -name Cargo.toml -print0)

          if [ -n "$selected" ]; then
            # normalize path
            selected="${selected#./}"
            echo "manifest=$selected" >> "$GITHUB_OUTPUT"
            # compute manifest dir
            dir="$(dirname "$selected")"
            [ "$dir" = "." ] && dir="."
            echo "manifest_dir=$dir" >> "$GITHUB_OUTPUT"
            echo "Found manifest: $selected (dir: $dir)"
            exit 0
          fi

          # fallback locations for common layouts
          if [ -f MarketData/Cargo.toml ]; then
            echo "manifest=MarketData/Cargo.toml" >> "$GITHUB_OUTPUT"
            echo "manifest_dir=MarketData" >> "$GITHUB_OUTPUT"
            echo "Found manifest: MarketData/Cargo.toml"
            exit 0
          fi
          if [ -f Cargo.toml ]; then
            echo "manifest=Cargo.toml" >> "$GITHUB_OUTPUT"
            echo "manifest_dir=." >> "$GITHUB_OUTPUT"
            echo "Found manifest: Cargo.toml"
            exit 0
          fi

          echo "No suitable Cargo.toml found containing package 'market_data' or in fallback locations" >&2
          exit 1

      - name: Cache cargo registry and git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache target
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-target-${{ matrix.rust }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-${{ matrix.rust }}-

      - name: Install Rust toolchain and components
        uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ matrix.rust }}
          profile: minimal
          override: true
          components: rustfmt, clippy

      - name: Run cargo fmt (check)
        working-directory: ${{ steps.manifest.outputs.manifest_dir }}
        run: |
          cargo fmt --all -- --check

      - name: Run cargo clippy (deny warnings)
        working-directory: ${{ steps.manifest.outputs.manifest_dir }}
        run: |
          cargo clippy --package market_data --all-targets -- -D warnings || true

      - name: Run tests
        working-directory: ${{ steps.manifest.outputs.manifest_dir }}
        run: |
          cargo test --package market_data -- --nocapture

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Locate Cargo manifest
        id: manifest-audit
        run: |
          if [ -f Cargo.toml ]; then
            echo "manifest=Cargo.toml" >> $GITHUB_OUTPUT
          elif [ -f MarketData/Cargo.toml ]; then
            echo "manifest=MarketData/Cargo.toml" >> $GITHUB_OUTPUT
          else
            echo "No Cargo.toml found in repository root or MarketData/" >&2
            exit 1
          fi

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Install cargo-audit
        run: |
          cargo install cargo-audit

      - name: Run cargo audit
        run: |
          manifest="${{ steps.manifest-audit.outputs.manifest }}"
          cargo audit --manifest-path "$manifest"

  coverage:
    name: Coverage (tarpaulin)
    runs-on: ubuntu-latest
    needs: audit
    steps:
      - uses: actions/checkout@v4
      - name: Locate Cargo manifest
        id: manifest-coverage
        run: |
          if [ -f Cargo.toml ]; then
            echo "manifest=Cargo.toml" >> $GITHUB_OUTPUT
          elif [ -f MarketData/Cargo.toml ]; then
            echo "manifest=MarketData/Cargo.toml" >> $GITHUB_OUTPUT
          else
            echo "No Cargo.toml found in repository root or MarketData/" >&2
            exit 1
          fi

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Install cargo-tarpaulin
        run: |
          cargo install cargo-tarpaulin

      - name: Run tarpaulin coverage
        run: |
          manifest="${{ steps.manifest-coverage.outputs.manifest }}"
          cargo tarpaulin --manifest-path "$manifest" --out Xml


  live-tests:
    name: Live/network tests (manual)
    if: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.run_live_tests == 'true') }}
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain and components
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true
          components: rustfmt, clippy
      - name: Run live/network tests
        env:
          MARKET_DATA_LIVE_TESTS: 1
        run: |
          if [ -f Cargo.toml ]; then
            cargo test --package market_data -- --nocapture
          elif [ -f MarketData/Cargo.toml ]; then
            cargo test --manifest-path MarketData/Cargo.toml --package market_data -- --nocapture
          else
            echo "No Cargo.toml found to run live tests against" >&2
            exit 1
          fi
