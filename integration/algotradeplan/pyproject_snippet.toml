# Suggested companion snippet for develooper1994/AlgoTradePlan pyproject.toml

[project.optional-dependencies]
# Existing groups omitted for brevity. The bridge itself uses the standard library
# (`json`, `subprocess`, `pathlib`) and the external Rust binary built from this
# repository, so no extra Python dependency is required.
market_data_bridge = []

[tool.algotradeplan.market_data]
# Point this to the built Rust bridge binary:
# cargo build --release --bin market_data_bridge
binary = "/absolute/path/to/MarketData/target/release/market_data_bridge"
